<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        rel="icon"
        type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='20' y='10' width='60' height='80' rx='5' fill='%232980b9'/%3E%3Cpath d='M30 10v80M20 25h60M20 40h60' stroke='white' stroke-width='2'/%3E%3Ctext x='42' y='65' fill='white' font-family='Arial' font-weight='bold' font-size='40'%3EБ%3C/text%3E%3C/svg%3E"
    />
    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 18px;
            line-height: 1.8;
            color: #404040;
            max-width: 850px;
            margin: 50px auto;
            padding: 0 30px;
            background-color: #fcfcfc;
        }
        a {
            color: #3498db;
            text-decoration: none;
            border-bottom: 1px solid rgba(52, 152, 219, 0.3);
            transition: all 0.2s ease;
        }
        a:hover {
            color: #2980b9;
            border-bottom: 2px solid #2980b9;
            background-color: rgba(52, 152, 219, 0.05);
        }
        h1 { color: #1a2a3a; border-bottom: 3px solid #3498db; padding-bottom: 12px; font-size: 1.4em; }
        h2 { color: #2980b9; margin-top: 1.8em; font-size: 1.2em; }
        .samp {
            background-color: #f4f4f4;
            padding: 2px 45px 2px 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            display: none;
            color: #212121;
            align-items: center;
            margin: 8px 0;
            white-space: pre-wrap;
            border-radius: 8px;
            position: relative;
            min-height: 24px;
            font-size: 0.88em;
        }
        .samp:first-child,
        :not(.samp) + .samp {
            display: flex !important;
        }
        .samp.js-expanded {
            display: flex !important;
        }
        div.samp p i {
            font-style: normal;
        }
        .samp-clickable {
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .samp-clickable:hover {
            background-color: #ededed;
        }
        .samp-hidden {
            display: none !important;
        }
        .samp-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
            opacity: 0.33;
            font-weight: bold;
            font-size: 1.4em;
            line-height: 1;
            pointer-events: none;
        }
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: none;
            width: 45px;
            height: 45px;
            background-color: rgba(255, 255, 255, 0.1); 
            color: #add8e6; 
            border: 1px solid rgba(173, 216, 230, 0.3);
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            z-index: 9999;
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
            transition: all 0.3s ease;
        }
        #backToTop:hover {
            background-color: rgba(173, 216, 230, 0.2);
            color: #87ceeb;
        }
        #searchBtn {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 38px;
            height: 38px;
            background-color: rgba(255, 255, 255, 0.02); 
            color: #add8e6;
            border: 1px solid rgba(173, 216, 230, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 14px;
            z-index: 9999;
            opacity: 0.5;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.4s ease;
        }
        #searchBtn:hover {
            opacity: 0.9;
            background-color: rgba(173, 216, 230, 0.1);
            transform: scale(1.1);
        }
    </style>
    <script type="module">
        import { refMap } from './refs.js';

        document.addEventListener("click", (e) => {
            const link = e.target.closest("a");
            if (!link) return;

            const href = link.getAttribute("href");

            if (href && href.startsWith("#")) {
                const targetId = href.replace('#', '');
                const localElement = document.getElementById(targetId);

                if (localElement) {
                    e.preventDefault();
                    localElement.scrollIntoView();
                } else if (refMap[targetId]) {
                    e.preventDefault();
                    window.location.href = refMap[targetId] + "#" + targetId;
                }
            }
        });

        const startPrefetching = () => {
            const links = document.querySelectorAll('a[href]');
            const filesToPrefetch = new Set();
            const currentFile = window.location.pathname.split('/').pop();

            links.forEach(link => {
                const href = link.getAttribute('href');
                let targetFile = null;

                if (href.startsWith('#')) {
                    const targetId = href.replace('#', "");
                    targetFile = typeof refMap !== 'undefined' ? refMap[targetId] : null;
                } else if (href.endsWith('.html')) {
                    targetFile = href.split('#')[0];
                }

                if (targetFile && targetFile !== currentFile && targetFile !== 'index.html') {
                    filesToPrefetch.add(targetFile);
                }
            });

            filesToPrefetch.forEach(file => {
                const linkTag = document.createElement('link');
                linkTag.rel = 'prefetch';
                linkTag.href = file;
                linkTag.as = 'document';
                document.head.appendChild(linkTag);
                
                if (!linkTag.relList?.supports('prefetch')) {
                    fetch(file, { priority: 'low', mode: 'no-cors' }).catch(() => {});
                }
            });
        };

        const initSamps = () => {
            const allSamps = document.querySelectorAll('.samp');
            let currentGroup = [];

            allSamps.forEach((samp) => {
                currentGroup.push(samp);
                const next = samp.nextElementSibling;

                if (!next || !next.classList.contains('samp')) {
                    const [first, ...rest] = currentGroup;

                    if (rest.length > 0) {
                        first.classList.add('samp-clickable');
                        
                        const indicator = document.createElement('div');
                        indicator.className = 'samp-toggle';
                        indicator.textContent = '+';
                        first.appendChild(indicator);

                        first.onclick = () => {
                            const isExpanding = indicator.textContent === '+';
                            
                            rest.forEach(el => {
                                el.classList.toggle('js-expanded', isExpanding);
                            });

                            indicator.textContent = isExpanding ? '−' : '+';
                        };
                    }
                    currentGroup = [];
                }
            });
        };

        const topBtn = () => {
            const topBtn = document.getElementById("backToTop");

            if (topBtn) {
                window.addEventListener("scroll", () => {
                    const isVisible = window.scrollY > 300;
                    topBtn.style.display = isVisible ? "block" : "none";
                }, { passive: true });

                topBtn.onclick = () => {
                    window.scrollTo({ top: 0 });
                };
            }
        };

        const runAll = () => {
            topBtn();
            initSamps();
            setTimeout(startPrefetching, 100); 
        };

        if (document.readyState !== 'loading') {
            runAll();
        } else {
            document.addEventListener('DOMContentLoaded', runAll);
        }
    </script>
</head>

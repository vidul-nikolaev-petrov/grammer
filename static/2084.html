<div class="aMhyJ"><div class=""><h1 data-lvl="2" data-ref="Присъединителни конструкции" id="bski669">Присъединителни конструкции</h1><h2 data-lvl="0" data-ref="84." id="84">84.</h2><p>Присъединителните конструкции се отделят със запетая.</p><div class="samp first-samp collapsed"><p><i class="ex">Тя се разсърди, и с право.</i></p></div><div class="samp"><p><i class="ex">Постигнахте успех, и то какъв.</i></p></div><div class="samp"><p><i class="ex">Отговорих на въпросите, при това бързо.</i></p></div><div class="samp"><p><i class="ex">Ще се справим със задачата, плюс това в срок.</i></p></div><p>[За употреба на тире вж. т. <a href="#102.13">102.13</a>.]</p></div></div>

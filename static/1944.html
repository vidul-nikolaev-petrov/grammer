<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        rel="icon"
        type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 100 100'%3E%3Crect x='20' y='10' width='60' height='80' rx='5' fill='%232980b9'/%3E%3Cpath d='M30 10v80M20 25h60M20 40h60' stroke='white' stroke-width='2'/%3E%3Ctext x='42' y='65' fill='white' font-family='Arial' font-weight='bold' font-size='40'%3EБ%3C/text%3E%3C/svg%3E"
    />
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 18px;
            line-height: 1.8;
            color: #222;
            max-width: 850px;
            margin: 50px auto;
            padding: 0 30px;
            background-color: #fcfcfc;
        }
        a {
            color: #3498db;
            text-decoration: none;
            border-bottom: 1px solid rgba(52, 152, 219, 0.3);
            transition: all 0.2s ease;
        }
        a:hover {
            color: #2980b9;
            border-bottom: 2px solid #2980b9;
            background-color: rgba(52, 152, 219, 0.05);
        }
        h1 { color: #1a2a3a; border-bottom: 3px solid #3498db; padding-bottom: 12px; font-size: 1.4em; }
        h2 { color: #2980b9; margin-top: 1.8em; font-size: 1.2em; }
        .samp {
            background-color: #f4f4f4;
            border-left: 4px solid #2980b9;
            padding: 5px 45px 5px 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            display: flex;
            align-items: center;
            margin: 8px 0;
            white-space: pre-wrap;
            border-radius: 4px;
            position: relative;
            min-height: 32px;
            font-size: 0.95em;
        }
        .samp-clickable {
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .samp-clickable:hover {
            background-color: #ededed;
        }
        .samp-hidden {
            display: none !important;
        }
        .samp-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #2980b9;
            font-weight: bold;
            font-size: 1.4em;
            line-height: 1;
            pointer-events: none;
        }
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: none;
            width: 45px;
            height: 45px;
            background-color: rgba(255, 255, 255, 0.1); 
            color: #add8e6; 
            border: 1px solid rgba(173, 216, 230, 0.3);
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            z-index: 9999;
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
            transition: all 0.3s ease;
        }
        #backToTop:hover {
            background-color: rgba(173, 216, 230, 0.2);
            color: #87ceeb;
        }
    </style>
    <script type="module">
        import { refMap } from './refs.js';

        document.addEventListener("click", (e) => {
            const link = e.target.closest("a");
            if (!link) return;

            const href = link.getAttribute("href");
            if (href && href.startsWith("#")) {
                const targetId = href.replace(/^#\/?/, "");
                const localElement = document.getElementById(targetId);

                if (localElement) {
                    e.preventDefault();
                    localElement.scrollIntoView({ behavior: 'smooth' });
                } else if (refMap[targetId]) {
                    e.preventDefault();
                    window.location.href = refMap[targetId] + "#" + targetId;
                }
            }
        });

        window.addEventListener('load', () => {
            const links = document.querySelectorAll('a[href^="#"]');
            const filesToPrefetch = new Set();
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            const topBtn = document.getElementById("backToTop");

            links.forEach(link => {
                const targetId = link.getAttribute('href').replace(/^#\/?/, "");
                const targetFile = refMap[targetId];
                if (targetFile && targetFile !== window.location.pathname.split('/').pop()) {
                    filesToPrefetch.add(targetFile);
                }
            });

            filesToPrefetch.forEach(file => {
                const linkTag = document.createElement('link');
                linkTag.rel = 'prefetch';
                linkTag.href = file;
                document.head.appendChild(linkTag);
            });

            if (isSafari) {
                filesToPrefetch.forEach(file => fetch(file));
            }

            const allSamps = document.querySelectorAll('.samp');
            let currentGroup = [];
            allSamps.forEach((samp, i) => {
                currentGroup.push(samp);
                const next = samp.nextElementSibling;
                if (!next || !next.classList.contains('samp')) {
                    if (currentGroup.length > 1) {
                        const [first, ...rest] = currentGroup;
                        rest.forEach(el => el.classList.add('samp-hidden'));
                        
                        first.classList.add('samp-clickable');
                        const indicator = document.createElement('div');
                        indicator.className = 'samp-toggle';
                        indicator.textContent = '+';
                        first.appendChild(indicator);

                        first.onclick = () => {
                            const isHidden = rest[0].classList.contains('samp-hidden');
                            rest.forEach(el => el.classList.toggle('samp-hidden'));
                            indicator.textContent = isHidden ? '−' : '+';
                        };
                    }
                    currentGroup = [];
                }
            });

            window.addEventListener("scroll", () => {
                if (window.scrollY > 300) {
                    topBtn.style.display = "block";
                } else {
                    topBtn.style.display = "none";
                }
            }, { passive: true });

            topBtn.addEventListener("click", () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    </script>
</head>
<body>
<div class="aMhyJ"><div class=""><h1 data-lvl="3" data-ref="Запетая в простото изречение" id="bski419">Запетая в простото изречение</h1><p>В простото изречение запетаята служи за отделяне на еднородни и на обособени части на изречението, на вметнати думи и изрази, обръщения, междуметия, частици, както и на присъединителни конструкции.</p><p>След запетаята се поставя и шпация.</p></div><div class="lYTjX"><h3 class="deNwD o1-H2"><span class="XTUiN"><a href="1947.html" class=""><label>Еднородни части</label></a></span></h3><h3 class="deNwD o1-H2"><span class="XTUiN"><a href="1998.html" class=""><label>Обособени части</label></a></span></h3><h3 class="deNwD o1-H2"><span class="XTUiN"><a href="2029.html" class=""><label>Вметнати думи и изрази</label></a></span></h3><h3 class="deNwD o1-H2"><span class="XTUiN"><a href="2056.html" class=""><label>Обръщения</label></a></span></h3><h3 class="deNwD o1-H2"><span class="XTUiN"><a href="2070.html" class=""><label>Междуметия и частици</label></a></span></h3><h3 class="deNwD o1-H2"><span class="XTUiN"><a href="2084.html" class=""><label>Присъединителни конструкции</label></a></span></h3></div></div>
<button id="backToTop" title="Go to top">↑</button>
</body>
</html>

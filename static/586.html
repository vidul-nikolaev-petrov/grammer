        type="image/svg+xml"

    />
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 18px;
            line-height: 1.8;
            color: #222;
            max-width: 850px;
            margin: 50px auto;
            padding: 0 30px;
            background-color: #fcfcfc;
        }
        /* Prettier Links */
        a {
            color: #3498db;
            text-decoration: none;
            border-bottom: 1px solid rgba(52, 152, 219, 0.3);
            transition: all 0.2s ease;
        }
        a:hover {
            color: #2980b9;
            border-bottom: 2px solid #2980b9;
            background-color: rgba(52, 152, 219, 0.05);
        }
        h1 { color: #1a2a3a; border-bottom: 3px solid #3498db; padding-bottom: 12px; font-size: 1.4em; }
        h2 { color: #2980b9; margin-top: 1.8em; font-size: 1.2em; }
        .samp {
            background-color: #f4f4f4;
            border-left: 5px solid #2980b9;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            display: block;
            margin: 25px 0;
            white-space: pre-wrap;
            border-radius: 6px;
        }
    </style>
    <script type="module">
        import { refMap } from './refs.js';

        document.addEventListener("click", (e) => {
            const link = e.target.closest("a");
            if (!link) return;

            const href = link.getAttribute("href");
            if (href && href.startsWith("#")) {
                const targetId = href.replace(/^#\/?/, "");
                const localElement = document.getElementById(targetId);

                if (localElement) {
                    e.preventDefault();
                    localElement.scrollIntoView({ behavior: 'smooth' });
                } else if (refMap[targetId]) {
                    e.preventDefault();
                    window.location.href = refMap[targetId] + "#" + targetId;
                }
            }
        });
    </script>
</head>

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        rel="icon"
        type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='20' y='10' width='60' height='80' rx='5' fill='%232980b9'/%3E%3Cpath d='M30 10v80M20 25h60M20 40h60' stroke='white' stroke-width='2'/%3E%3Ctext x='42' y='65' fill='white' font-family='Arial' font-weight='bold' font-size='40'%3EБ%3C/text%3E%3C/svg%3E"
    />
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 18px;
            line-height: 1.8;
            color: #222;
            max-width: 850px;
            margin: 50px auto;
            padding: 0 30px;
            background-color: #fcfcfc;
        }
        /* Prettier Links */
        a {
            color: #3498db;
            text-decoration: none;
            border-bottom: 1px solid rgba(52, 152, 219, 0.3);
            transition: all 0.2s ease;
        }
        a:hover {
            color: #2980b9;
            border-bottom: 2px solid #2980b9;
            background-color: rgba(52, 152, 219, 0.05);
        }
        h1 { color: #1a2a3a; border-bottom: 3px solid #3498db; padding-bottom: 12px; font-size: 1.4em; }
        h2 { color: #2980b9; margin-top: 1.8em; font-size: 1.2em; }
        .samp {
            background-color: #f4f4f4;
            border-left: 5px solid #2980b9;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            display: block;
            margin: 25px 0;
            white-space: pre-wrap;
            border-radius: 6px;
        }
    </style>
    <script>
    document.addEventListener("click", async (e) => {
        const link = e.target.closest("a");
        if (link && link.getAttribute("href") && link.getAttribute("href").startsWith("#")) {
            const targetId = link.getAttribute("href").replace(/^#\/?/, "");
            
            const localElement = document.getElementById(targetId);
            if (localElement) {
                e.preventDefault();
                localElement.scrollIntoView({ behavior: 'smooth' });
            } else {
                e.preventDefault();
                try {
                    const response = await fetch("refs.json");
                    const refMap = await response.json();
                    if (refMap[targetId]) {
                        window.location.href = refMap[targetId] + "#" + targetId;
                    }
                } catch (err) {
                    console.error("Navigation error");
                }
            }
        }
    });
    </script>
</head>
<body>
<div class="aMhyJ"><div class=""><h1 data-lvl="4" data-ref="Буква ь (ер малък)" id="bski541">Буква ь (ер малък)</h1><h2 data-lvl="0" data-ref="1.6." id="1.6">1.6.</h2><p>Буквата <i class="frag">ь</i> (ер малък) се използва единствено за предаване на мекост на съгласна пред <i class="frag">о</i> и затова се среща само в буквосъчетанието <i class="frag">-ьо-</i>.</p><div class="samp"><p><i class="ex">миньор, шофьор, каньон, гьон, пастьоризирам, сьомга, гастрольор, жонгльор</i></p></div><h2 data-lvl="0" data-ref="1.6.1." id="1.6.1">1.6.1.</h2><p>Не се пише буква <i class="frag">ь</i> след буквите <i class="frag">ж</i>, <i class="frag">ч</i>, <i class="frag">ш</i>.</p></div></div>
</body>
</html>

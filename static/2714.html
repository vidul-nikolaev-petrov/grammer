<div class="aMhyJ"><div class=""><h1 data-lvl="4" data-ref="Кавички при пряка реч" id="bski1135">Кавички при пряка реч</h1><h2 data-lvl="0" data-ref="104.2." id="104.2">104.2.</h2><p>Кавички се употребяват при предаване на пряка реч.</p><div class="samp"><p><i class="ex">И ако някой по същото време го запита: „Е, Сократе, какво пишеш сега?“, той ще отвърне, без да вдига глава: „Когато пиша, аз вече не съм Сократ, а Платон“.</i></p></div><p>[Вж. Оформяне на текст с пряка реч, т. <a href="#131.4">131.4</a>.]</p></div></div>

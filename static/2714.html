<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        rel="icon"
        type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='20' y='10' width='60' height='80' rx='5' fill='%232980b9'/%3E%3Cpath d='M30 10v80M20 25h60M20 40h60' stroke='white' stroke-width='2'/%3E%3Ctext x='42' y='65' fill='white' font-family='Arial' font-weight='bold' font-size='40'%3EБ%3C/text%3E%3C/svg%3E"
    />
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 18px;
            line-height: 1.8;
            color: #222;
            max-width: 850px;
            margin: 50px auto;
            padding: 0 30px;
            background-color: #fcfcfc;
        }
        /* Prettier Links */
        a {
            color: #3498db;
            text-decoration: none;
            border-bottom: 1px solid rgba(52, 152, 219, 0.3);
            transition: all 0.2s ease;
        }
        a:hover {
            color: #2980b9;
            border-bottom: 2px solid #2980b9;
            background-color: rgba(52, 152, 219, 0.05);
        }
        h1 { color: #1a2a3a; border-bottom: 3px solid #3498db; padding-bottom: 12px; font-size: 1.4em; }
        h2 { color: #2980b9; margin-top: 1.8em; font-size: 1.2em; }
        .samp {
            background-color: #f4f4f4;
            border-left: 5px solid #2980b9;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            display: block;
            margin: 25px 0;
            white-space: pre-wrap;
            border-radius: 6px;
        }
        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: none;
            width: 45px;
            height: 45px;
            background-color: rgba(255, 255, 255, 0.1); 
            color: #add8e6; 
            border: 1px solid rgba(173, 216, 230, 0.3);
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            z-index: 9999;
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        #backToTop:hover {
            background-color: rgba(173, 216, 230, 0.2);
            color: #87ceeb; /* Slightly deeper skyblue on hover */
        }
    </style>
    <script type="module">
        import { refMap } from './refs.js';

        document.addEventListener("click", (e) => {
            const link = e.target.closest("a");
            if (!link) return;

            const href = link.getAttribute("href");
            if (href && href.startsWith("#")) {
                const targetId = href.replace(/^#\/?/, "");
                const localElement = document.getElementById(targetId);

                if (localElement) {
                    e.preventDefault();
                    localElement.scrollIntoView({ behavior: 'smooth' });
                } else if (refMap[targetId]) {
                    e.preventDefault();
                    window.location.href = refMap[targetId] + "#" + targetId;
                }
            }
        });

        window.addEventListener('load', () => {
            const links = document.querySelectorAll('a[href^="#"]');
            const filesToPrefetch = new Set();
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            const topBtn = document.getElementById("backToTop");

            links.forEach(link => {
                const targetId = link.getAttribute('href').replace(/^#\/?/, "");
                const targetFile = refMap[targetId];
                
                if (targetFile && targetFile !== window.location.pathname.split('/').pop()) {
                    filesToPrefetch.add(targetFile);
                }
            });

            filesToPrefetch.forEach(file => {
                const linkTag = document.createElement('link');
                linkTag.rel = 'prefetch';
                linkTag.href = file;
                document.head.appendChild(linkTag);
            });

            if (isSafari) {
                fetch(file);
            }

            window.addEventListener("scroll", () => {
                if (window.scrollY > 300) {
                    topBtn.style.display = "block";
                } else {
                    topBtn.style.display = "none";
                }
            }, { passive: true }); // "passive" helps Android scroll performance

            topBtn.addEventListener("click", () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    </script>
</head>
<body>
<div class="aMhyJ"><div class=""><h1 data-lvl="4" data-ref="Кавички при пряка реч" id="bski1135">Кавички при пряка реч</h1><h2 data-lvl="0" data-ref="104.2." id="104.2">104.2.</h2><p>Кавички се употребяват при предаване на пряка реч.</p><div class="samp"><p><i class="ex">И ако някой по същото време го запита: „Е, Сократе, какво пишеш сега?“, той ще отвърне, без да вдига глава: „Когато пиша, аз вече не съм Сократ, а Платон“.</i></p></div><p>[Вж. Оформяне на текст с пряка реч, т. <a href="#131.4">131.4</a>.]</p></div></div>
<button id="backToTop" title="Go to top">↑</button>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 18px;
            line-height: 1.8;
            color: #222;
            max-width: 850px;
            margin: 50px auto;
            padding: 0 30px;
            background-color: #fcfcfc;
        }
        /* Prettier Links */
        a {
            color: #3498db;
            text-decoration: none;
            border-bottom: 1px solid rgba(52, 152, 219, 0.3);
            transition: all 0.2s ease;
        }
        a:hover {
            color: #2980b9;
            border-bottom: 2px solid #2980b9;
            background-color: rgba(52, 152, 219, 0.05);
        }
        h1 { color: #1a2a3a; border-bottom: 3px solid #3498db; padding-bottom: 12px; font-size: 2.5em; }
        h2 { color: #2980b9; margin-top: 1.8em; font-size: 2em; }
        .samp {
            background-color: #f4f4f4;
            border-left: 5px solid #2980b9;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            display: block;
            margin: 25px 0;
            white-space: pre-wrap;
            border-radius: 6px;
        }
    </style>
    <script>
    document.addEventListener("click", async (e) => {
        const link = e.target.closest("a");
        if (link && link.getAttribute("href") && link.getAttribute("href").startsWith("#")) {
            const targetId = link.getAttribute("href").replace(/^#\/?/, "");
            
            const localElement = document.getElementById(targetId);
            if (localElement) {
                e.preventDefault();
                localElement.scrollIntoView({ behavior: 'smooth' });
            } else {
                e.preventDefault();
                try {
                    const response = await fetch("refs.json");
                    const refMap = await response.json();
                    if (refMap[targetId]) {
                        window.location.href = refMap[targetId] + "#" + targetId;
                    }
                } catch (err) {
                    console.error("Navigation error");
                }
            }
        }
    });
    </script>
</head>
<body>
<div class="aMhyJ"><div class=""><h1 data-lvl="2" data-ref="Преносна употреба на вселена, земя, луна и под." id="bski629">Преносна употреба на <i class="frag">вселена</i>, <i class="frag">земя</i>, <i class="frag">луна</i> и <i class="frag">под</i>.</h1><h2 data-lvl="0" data-ref="42.3." id="42.3">42.3.</h2><p>С малка буква се пишат думите <i class="ex">вселена</i>, <i class="ex">земя</i>, <i class="ex">луна</i>, <i class="ex">слънце</i>, <i class="ex">космос</i>, когато не назовават астрономически обекти.</p><div class="samp first-samp collapsed"><p><i class="ex">Всяко човешко същество е една малка вселена.</i></p></div><div class="samp"><p><i class="ex">Ябълките са нападали вече по земята.</i></p></div><div class="samp"><p><i class="ex">Той е нейният космос.</i></p></div></div></div>
</body>
</html>

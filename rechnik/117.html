<div class="aMhyJ"><div class=""><h1 data-lvl="6" data-ref="Общи правописни правила" id="bski1">Общи правописни правила</h1><p>Общите правописни правила се определят от взаимодействието между правописните принципи и се отнасят до целия речников състав на съвременния български книжовен език.</p></div><div class="lYTjX"><h3 class="deNwD o1-H2"><span class="XTUiN"><a href="/rechnik/119" class=""><label>Правописни правила с фонетичен характер</label></a></span></h3><div class="JHmXs"><p><span class="XTUiN"><a href="/rechnik/120" class=""><label>Променливо <i class="frag">я</i></label></a></span></p><p><span class="XTUiN"><a href="/rechnik/166" class=""><label>Вмятане и изпадане на гласни и съгласни</label></a></span></p><p><span class="XTUiN"><a href="/rechnik/198" class=""><label>Групи <i class="frag">-ръ-/-ър</i>- и <i class="frag">-лъ-/-ъл-</i></label></a></span></p><p><span class="XTUiN"><a href="/rechnik/215" class=""><label>Групи <i class="frag">-ея</i>, <i class="frag">-ия</i>, <i class="frag">-еа-</i>, <i class="frag">-иа-</i></label></a></span></p><p><span class="XTUiN"><a href="/rechnik/227" class=""><label>Правопис на <i class="frag">-к-</i> и <i class="frag">-г-</i> в глаголни форми</label></a></span></p><p><span class="XTUiN"><a href="/rechnik/231" class=""><label>Удвояване на предлозите <i class="frag">в</i> и <i class="frag">с</i></label></a></span></p></div><h3 class="deNwD o1-H2"><span class="XTUiN"><a href="/rechnik/247" class=""><label>Правопис на двойни съгласни</label></a></span></h3><div class="JHmXs"><p><span class="XTUiN"><a href="/rechnik/250" class=""><label>Двойно н (-нн-) в прилагателни на <i class="frag">-нен</i></label></a></span></p><p><span class="XTUiN"><a href="/rechnik/259" class=""><label>Двойно н (-нн-) в съществителни с наставка <i class="frag">-ник</i></label></a></span></p><p><span class="XTUiN"><a href="/rechnik/263" class=""><label>Двойно т (-тт-) в членувани форми</label></a></span></p><p><span class="XTUiN"><a href="/rechnik/2
